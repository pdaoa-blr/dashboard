<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pavani Divine Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="nav" id="nav">
      <div class="nav-brand">
        <div class="nav-image-container">
          <img
            src="./assets/images/pd.webp?auto=format&fit=crop&w=400&q=80"
            alt="Pavani Divine"
            class="nav-image"
            crossorigin="anonymous"
          />
          <div class="nav-image-overlay">
            <span class="nav-brand-name">Pavani Divine</span>
          </div>
        </div>
      </div>
      <button class="nav-item active" data-tab="dashboard">
        <svg
          class="nav-icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <rect x="3" y="3" width="7" height="7" />
          <rect x="14" y="3" width="7" height="7" />
          <rect x="14" y="14" width="7" height="7" />
          <rect x="3" y="14" width="7" height="7" />
        </svg>
        <span class="nav-label">Dashboard</span>
        <span class="nav-indicator"></span>
      </button>
      <button class="nav-item" data-tab="financials">
        <svg
          class="nav-icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <rect x="2" y="12" width="20" height="12" rx="2" />
          <path d="M12 12h.01" />
          <path d="M17 12a5 5 0 0 0-10 0" />
        </svg>
        <span class="nav-label">Financials</span>
        <span class="nav-indicator"></span>
      </button>
      <button class="nav-item" data-tab="facilities">
        <svg
          class="nav-icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M6.5 6.5a3.5 3.5 0 1 0 7 0 3.5 3.5 0 1 0-7 0" />
          <path d="M14 17.5a3 3 0 1 0 6 0 3 3 0 1 0-6 0" />
          <path d="M20.5 6.5h-7" />
          <path d="M14.5 20.5H3.5" />
        </svg>
        <span class="nav-label">Facilities</span>
        <span class="nav-indicator"></span>
      </button>
      <button class="nav-item" data-tab="projects">
        <svg
          class="nav-icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            d="M15 12l-8.5 8.5c-.83.83-2.17.83-3 0 0 0 0 0 0 0a2.12 2.12 0 0 1 0-3L12 9"
          />
          <path d="M17.64 15L22 10.64" />
          <path
            d="m20.91 11.7-1.25-1.25c-.6-.6-.93-1.4-.93-2.25v-.86L16.01 4.6a5.56 5.56 0 0 0-3.94-1.64H9l.92.82A6.18 6.18 0 0 1 12 8.4v1.56l2 2h2.47l2.26 1.91"
          />
        </svg>
        <span class="nav-label">Projects</span>
        <span class="nav-indicator"></span>
      </button>
      <button class="nav-item" data-tab="documents">
        <svg
          class="nav-icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"
          />
          <polyline points="14 2 14 8 20 8" />
          <line x1="16" y1="13" x2="8" y2="13" />
          <line x1="16" y1="17" x2="8" y2="17" />
          <line x1="10" y1="9" x2="8" y2="9" />
        </svg>
        <span class="nav-label">Docs</span>
        <span class="nav-indicator"></span>
      </button>
    </nav>

    <main class="main" id="main">
      <header class="header">
        <div class="header-content">
          <div class="header-badges">
            <a
              href=""
              id="officialLink"
              target="_blank"
              rel="noopener noreferrer"
              class="official-link"
            >
              Official Site
              <svg
                class="link-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"
                />
                <polyline points="15 3 21 3 21 9" />
                <line x1="10" y1="14" x2="21" y2="3" />
              </svg>
            </a>
          </div>
          <h1 class="header-title">Pavani Divine Dashboard</h1>
          <p class="header-subtitle" id="headerSubtitle">
            Community & Financial Updates
          </p>
        </div>
        <div class="header-date">
          <svg
            class="date-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
            <line x1="16" y1="2" x2="16" y2="6" />
            <line x1="8" y1="2" x2="8" y2="6" />
            <line x1="3" y1="10" x2="21" y2="10" />
          </svg>
          <select id="monthSelector" class="month-selector"></select>
        </div>
      </header>

      <div class="tab-content active" id="tab-dashboard"></div>
      <div class="tab-content" id="tab-financials"></div>
      <div class="tab-content" id="tab-facilities"></div>
      <div class="tab-content" id="tab-projects"></div>
      <div class="tab-content" id="tab-documents"></div>
    </main>

    <script src="data.json" type="application/json" id="dataJson"></script>
    <script src="app.js"></script>
  </body>
</html>
